# Full OpenShell policy for Telegram Bot API access.
# Use this file when you want to apply Telegram access directly with
# `openshell policy set`, while keeping the preset wrapper in
# `presets/telegram.yaml` available for `nemoclaw <sandbox> policy-add`.

version: 1

network_policies:
  telegram_bot:
    name: telegram_bot
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }
          - allow: { method: GET, path: "/file/bot*/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
